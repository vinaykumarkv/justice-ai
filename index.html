<!DOCTYPE html>
<html>
<head>
  <title>Justice AI</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 120px; margin: 10px 0; padding: 8px; }
    button { padding: 10px 24px; background: #1a56db; color: white; border: none; cursor: pointer; }
    #result { margin-top: 24px; white-space: pre-wrap; background: #f4f4f4; padding: 16px; }
  </style>
</head>
<body>
  <h1>Justice AI — Case Briefing</h1>
  <p>Enter case details below:</p>
  <textarea id="caseInput" placeholder="Defendant name, charge, prior offences..."></textarea>
  <button onclick="getBriefing()">Generate Briefing</button>
  <div id="result"></div>

  <script>
    async function getBriefing() {
      const text = document.getElementById("caseInput").value
      document.getElementById("result").innerText = "Thinking..."

      const response = await fetch("http://localhost:5000/brief", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ case_text: text })
      })

      const data = await response.json()
      document.getElementById("result").innerText = data.briefing
    }
  </script>
</body>
</html>
